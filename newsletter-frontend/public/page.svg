<!--?xml version="1.0" encoding="UTF-8"?-->
<svg width="200" height="260" viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg">
  <!-- Main page body -->
  <rect x="10" y="10" width="180" height="240" rx="8" fill="#3b82f6"></rect>
  <!-- Folded corner -->
  <path d="M170,10 L190,30 L170,30 Z" fill="#93c5fd"></path>
  <!-- White inner fold highlight -->
  <path d="M170,10 L170,30 L190,30 Z" fill="white" opacity="0.5"></path>
  <!-- Optional drop shadow -->
  <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="rgba(0,0,0,0.2)"></feDropShadow>
  </filter>
  <rect x="10" y="10" width="180" height="240" rx="8" fill="none" filter="url(#dropShadow)"></rect>
</svg>
